# Plants vs. Zombies Configuration
env_name: "Pvz"
log_path: "logs/pvz"

runner:
  max_steps: 50  # 最大步数限制，到达后自动停止（无游戏结束判定）

env:
  task: "Defend your house from zombies by strategically placing plants"
  window_title: "Plants vs. Zombies"
  game_path: ""  # 需要用户配置游戏可执行文件路径
  action_mode: "semantic"  # "semantic" or "gui"
  timeout: 600
  screenshot_interval: 0.5
  
  # 网格配置（实际使用 constants.py 中的校准值）
  grid_rows: 5
  grid_cols: 9
  grid_cell_width: 81
  grid_cell_height: 100
  grid_offset_x: 38
  grid_offset_y: 120
  
  # 植物栏配置（实际使用 constants.py 中的校准值）
  plant_slot_width: 60
  milestone_model: "gemini-2.0-flash-exp"  # 用于提取里程碑的模型（通常是gemini-2.5-pro或gemini-2.0-flash-exp）
  coor_trans: false  # 是否启用坐标转换 (1000x1000 -> 实际分辨率)

# Agent configuration - 支持的视觉模型:
# Supported LLM models:
# - OpenAI: gpt-4o, gpt-4o-mini
# - Google: gemini-2.5-flash, gemini-2.5-pro
# - Qwen: qwen3-vl-8b-instruct, qwen3-vl-32b-instruct
# - Seed: doubao-seed-1-8-251228
agent:
  llm_name: gpt-4o
  temperature: 0.0
  repetition_penalty: 1.0
  agent_type: zeroshot_agent
  # Semantic模式 (默认): LLM输出如 "plant 0 at (2, 3)" 的语义动作
  prompt_path: agent_servers.pvz.prompts.semantic.zeroshot_agent
  # GUI模式: LLM直接输出JSON格式的鼠标键盘操作
  # 要使用GUI模式，需要:
  # 1. 设置 env.action_mode: "gui"
  # 2. 设置 agent.prompt_path: agent_servers.pvz.prompts.gui.zeroshot_agent
  # prompt_path: agent_servers.pvz.prompts.gui.zeroshot_agent
  # Embedding模型配置（用于长期记忆）
  embedding_model: "qwen"  # 可选值: "openai" 或 "qwen"，默认为 "qwen"
  embedding_config:  # embedding模型额外配置
    model: "text-embedding-v4"  # qwen embedding模型名称
    dimensions: 1024  # 向量维度
  # 视频反思相关配置
  use_reflection: false  # 是否使用视频反思经验（设置为true以启用）
  reflection_format: "json"  # 经验文件格式：json或txt
  reflection_file_path: "data/reflections/Pvz_reflections.json"  # 直接指定经验文件路径（优先使用，如果未指定则根据game_name和format自动构建）
  # 视频反思生成配置（用于generate_reflection.py）
  reflection_generation:
    failure_video_path: null  # 失败视频路径（必须指定）
    expert_video_path: null  # 专家视频路径（必须指定）
    obs_images_dir: null  # obs_images目录路径（用于GPT-4o，可选）
    max_length: 1000  # 经验文本最大长度
