# logging: true
env_name: SlayTheSpire
log_path: "logs"
runner:
  max_steps: 50
env:
  task: "Slay the Spire"
  player_class: "IRONCLAD"
  ascension_level: 0
  seed: 0
  action_mode: "semantic"  # "semantic" or "gui"
  mod_input_path: "data\\slay_the_spire\\mod_input.txt"
  mod_output_path: "data\\slay_the_spire\\mod_output.txt"
  window_title: "Modded Slay the Spire"
  milestone_model: "gemini-2.0-flash-exp"  # 用于提取里程碑的模型（通常是gemini-2.5-pro或gemini-2.0-flash-exp）
  coor_trans: false  # 是否启用坐标转换 (1000x1000 -> 实际分辨率)

# Supported LLM models:
# - OpenAI: gpt-4o, gpt-4o-mini
# - Google: gemini-2.5-flash, gemini-2.5-pro
# - Qwen: qwen3-vl-8b-instruct, qwen3-vl-32b-instruct
# - Seed: doubao-seed-1-8-251228
agent:
  llm_name: gpt-4o
  api_key: "token-abc123"
  api_base_url: "http://100.66.5.135:8000/v1"
  temperature: 0.0
  repetition_penalty: 1.0
  agent_type: zeroshot_agent
  prompt_path: agent_servers.slay_the_spire.prompts.semantic.zeroshot_agent
  # Embedding模型配置（用于长期记忆）
  embedding_model: "qwen"  # 可选值: "openai" 或 "qwen"，默认为 "qwen"
  embedding_config:  # embedding模型额外配置
    model: "text-embedding-v4"  # qwen embedding模型名称
    dimensions: 1024  # 向量维度
  # 视频反思相关配置
  use_reflection: false  # 是否使用视频反思经验（设置为true以启用）
  reflection_format: "json"  # 经验文件格式：json或txt
  reflection_file_path: "data\\reflections\\SlayTheSpire\\reflections.json"  # 直接指定经验文件路径（优先使用，如果未指定则根据game_name和format自动构建）
  # 视频反思生成配置（用于generate_reflection.py）
  reflection_generation:
    failure_video_path: null  # 失败视频路径（必须指定）
    expert_video_path: null  # 专家视频路径（必须指定）
    obs_images_dir: null  # obs_images目录路径（用于GPT-4o，可选）
    max_length: 1000  # 经验文本最大长度