# logging: true
env_name: Pwaat
log_path: "logs"
runner:
  max_steps: 500  # Full game needs more steps
env:
  task: "full_game"  # multiple_choice, cross_examination_1, cross_examination_2, cross_examination_3, full_game
  action_mode: "gui"  # "semantic" or "gui"
  window_title: "Phoenix Wright: Ace Attorney Trilogy / 逆転裁判123 成歩堂セレクション"
  input_modality: "image"
  state_root_dir: "C:\\Program Files (x86)\\Steam\\steamapps\\common\\Phoenix Wright Ace Attorney Trilogy\\logs"
  conversation_history_len: 20
  auto_savedfile: false  # full_game task should start from beginning
  milestone_model: "gemini-2.5-pro"  # 用于提取里程碑的模型（通常是gemini-2.5-pro或gemini-2.0-flash-exp）
  coor_trans: false  # 是否启用坐标转换 (1000x1000 -> 实际分辨率)

# Agent configuration
agent:
  # llm_name: nvidia/Mistral-NeMo-Minitron-8B-Instruct
  debug_mode: false
  # Supported LLM models:
  # - OpenAI: gpt-4o, gpt-4o-mini
  # - Google: gemini-2.5-flash, gemini-2.5-pro
  # - Qwen: qwen3-vl-8b-instruct, qwen3-vl-32b-instruct
  # - Seed: doubao-seed-1-8-251228
  llm_name: doubao-seed-1-8-251228
  api_key: "token-abc123"
  api_base_url: "http://YOUR_LOCAL_IP:PORT/v1"
  temperature: 0.7
  repetition_penalty: 1.0
  agent_type: memory_agent
  prompt_path: agent_servers.pwaat.prompts.gui.memory_agent
  long_term_memory_len: 5
  # Embedding模型配置（用于长期记忆）
  embedding_model: "qwen"  # 可选值: "openai" 或 "qwen"，默认为 "qwen"
  embedding_config:  # embedding模型额外配置
    model: "text-embedding-v4"  # qwen embedding模型名称
    dimensions: 1024  # 向量维度
  # 视频反思相关配置
  use_reflection: false  # 是否使用视频反思经验（设置为true以启用）
  reflection_format: "json"  # 经验文件格式：json或txt
  reflection_file_path: "data/reflections/Pwaat_reflections.json"  # 直接指定经验文件路径（优先使用，如果未指定则根据game_name和format自动构建）
  # 视频反思生成配置（用于generate_reflection.py）
  reflection_generation:
    failure_video_path: logs\Pwaat\qwen3-vl-32b-instruct\gui\memory_agent\20251209_131702\obs_video.mp4  # 失败视频路径（必须指定）
    expert_video_path: .\data\expertvideo\pwaat\playthrough_video.mp4  # 专家视频路径（必须指定）
    obs_images_dir: logs\Pwaat\qwen3-vl-32b-instruct\gui\memory_agent\20251209_131702\obs_images  # obs_images目录路径（用于GPT-4o，可选）
    max_length: 1000  # 经验文本最大长度