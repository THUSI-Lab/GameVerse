# Angry Birds Configuration
env_name: "AngryBirds"
log_path: "logs/angry_birds"

runner:
  max_steps: 15 # 每关最大步数 （semantic 15, gui 30)

env:
  task: "Destroy all pigs by launching birds from the slingshot"
  window_title: "Angry Birds"  # 游戏窗口标题(支持正则表达式如 "Angry Birds.*")
  action_mode: semantic  # "semantic" (shoot(angle, power)) or "gui"
  
  # 弹弓位置配置 (相对窗口坐标 0.0-1.0) - 备用值,优先使用自动检测
  slingshot_pos_x: 0.15
  slingshot_pos_y: 0.65
  
  # 射击参数
  slingshot_pull_ratio: 1.8  # 拉弓距离系数: 最大拉弓长度 = 弹弓高度 × ratio
  max_pull_distance: 0.15  # 最大拉弓距离(相对坐标) - 仅在未检测到弹弓高度时使用
  wait_after_shot: 5.0     # 射击后等待物理模拟(秒)
  wait_for_ui: 1.0         # UI 操作等待时间(秒)
  
  # 关卡配置
  scene: 1
  level: 1
  milestone_model: "gemini-2.0-flash-exp"  # 用于提取里程碑的模型（通常是gemini-2.5-pro或gemini-2.0-flash-exp）
  coor_trans: true  # 是否启用坐标转换 (1000x1000 -> 实际分辨率)

# Agent configuration - 需要支持视觉输入的模型
# Supported LLM models:
# - OpenAI: gpt-4o, gpt-4o-mini
# - Google: gemini-2.5-flash, gemini-2.5-pro
# - Qwen: qwen3-vl-8b-instruct, qwen3-vl-32b-instruct
# - Seed: doubao-seed-1-8-251228
agent:
  llm_name: gpt-4o-mini
  temperature: 0.0
  repetition_penalty: 1.0
  agent_type: zeroshot_agent
  prompt_path: agent_servers.angry_birds.prompts.semantic.zeroshot_agent  # 或 .image.zeroshot_agent
  # Embedding模型配置（用于长期记忆）
  embedding_model: "qwen"  # 可选值: "openai" 或 "qwen"，默认为 "qwen"
  embedding_config:  # embedding模型额外配置
    model: "text-embedding-v4"  # qwen embedding模型名称
    dimensions: 1024  # 向量维度
  # 视频反思相关配置
  use_reflection: false  # 是否使用视频反思经验（设置为true以启用）
  reflection_format: "json"  # 经验文件格式：json或txt
  reflection_file_path: "data/reflections/AngryBirds_reflections.json"  # 直接指定经验文件路径（优先使用，如果未指定则根据game_name和format自动构建）
  # 视频反思生成配置（用于generate_reflection.py）
  reflection_generation:
    failure_video_path: logs\angry_birds\AngryBirds\qwen3-vl-32b-instruct\semantic\zeroshot_agent\20251223_234330\obs_video.mp4  # 失败视频路径（必须指定）
    expert_video_path: data\expertvideo\angry_birds\2.mp4  # 专家视频路径（必须指定）
    obs_images_dir: logs\angry_birds\AngryBirds\qwen3-vl-32b-instruct\semantic\zeroshot_agent\20251223_234330  # obs_images目录路径（用于GPT-4o，可选）
    max_length: 1000  # 经验文本最大长度
